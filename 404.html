<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Page Not Found | Dereck Villagrana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="images/logos/site/logo-dark.svg">
  <link rel="manifest" href="site.webmanifest">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: var(--content-padding-y) var(--content-padding-x);
      max-width: 600px;
    }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(5rem, 15vw, 9rem);
      font-weight: 700;
      color: var(--color-accent);
      line-height: 1;
      margin: 0 0 0.25rem;
    }
    .error-heading {
      font-size: 1.25rem;
      font-weight: 500;
      color: var(--color-text);
      margin: 0 0 1rem;
    }
    .error-body {
      color: var(--color-muted);
      font-size: 0.9375rem;
      line-height: 1.6;
      margin: 0 0 2rem;
    }
    .error-link {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .error-link:hover { border-color: var(--color-accent); }
    .error-link:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 3px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-nav">Skip to main content</a>
  <main id="main-content" class="error-page">
    <p class="error-code">404</p>
    <h1 class="error-heading">Page not found.</h1>
    <p class="error-body">
      The page you're looking for doesn't exist or may have moved.
    </p>
    <a href="/" class="error-link">← Back to home</a>
  </main>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
